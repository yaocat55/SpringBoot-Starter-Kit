spring:
  application:
    name: springboot-dubbo

server:
  port: 8084

# ======================== Dubbo config ========================
dubbo:
  application:
    name: springboot-dubbo
    register-consumer: true
  # 组播注册中心 —— 零外部依赖，开箱即用。生产环境请替换为 Nacos
  registry:
    address: multicast://224.5.6.7:12345
  protocol:
    name: dubbo
    port: 20880
  consumer:
    check: false
    timeout: 3000
    retries: 1
  provider:
    timeout: 3000
    retries: 1

# ======================== logging ========================
logging:
  level:
    com.quick.springbootdubbo: debug
    org.apache.dubbo: info
